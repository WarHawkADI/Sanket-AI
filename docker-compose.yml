services:
  neo4j:
    image: neo4j:5.28.0
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt (Python driver)
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-sanket123}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-sanket123}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
  neo4j_logs:
